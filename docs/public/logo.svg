<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" width="40" height="40">
  <!-- Bézier curve representing CAGD -->
  <path d="M 6 32 C 10 8, 30 8, 34 32" fill="none" stroke="#8b1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Control polygon -->
  <line x1="6" y1="32" x2="10" y2="8" stroke="#8b1a1a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="10" y1="8" x2="30" y2="8" stroke="#8b1a1a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <line x1="30" y1="8" x2="34" y2="32" stroke="#8b1a1a" stroke-width="0.8" stroke-dasharray="2,2" opacity="0.5"/>
  <!-- Control points -->
  <circle cx="6" cy="32" r="2" fill="#8b1a1a"/>
  <circle cx="10" cy="8" r="2" fill="none" stroke="#8b1a1a" stroke-width="1.2"/>
  <circle cx="30" cy="8" r="2" fill="none" stroke="#8b1a1a" stroke-width="1.2"/>
  <circle cx="34" cy="32" r="2" fill="#8b1a1a"/>
</svg>
